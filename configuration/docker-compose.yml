services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ../backend/.chromadb:/app/.chromadb
      - ../backend/uploads:/app/uploads
    working_dir: /app
    environment:
      - FLASK_ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_ENDPOINT=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true

